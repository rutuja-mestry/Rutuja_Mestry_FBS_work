<html>
<head>
    <title>HTML Page</title>
</head>

<body>
    <h1>Web Page</h1>

    <form action="HTML page/dummy" method="post">
        
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your full name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="example@gmail.com"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" placeholder="1452469825"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter your password"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
</body>
</html>
